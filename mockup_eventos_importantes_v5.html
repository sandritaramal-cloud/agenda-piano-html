<div style="display:flex; justify-content:center; padding:1rem 0;">
<style>@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap');</style>
<div data-document-role="page" data-label="Eventos importantes" style="width:340px; aspect-ratio:148/210; background:#FBF8F6; border-radius:14px; border:0.5px solid var(--border); padding:26px 22px 20px 30px; font-family:'Quicksand',sans-serif; position:relative; overflow:hidden; box-sizing:border-box; display:flex; flex-direction:column;">

  <p style="margin:0 0 2px; font-size:10px; letter-spacing:1px; color:#8A6E80; font-weight:500; flex-shrink:0;">NO ME LO QUIERO PERDER</p>
  <h1 style="margin:0 0 10px; font-size:18px; font-weight:700; color:#4A2F42; flex-shrink:0;">Eventos importantes</h1>

  <div style="display:grid; grid-template-columns:2.2fr 1.6fr 1.2fr; grid-auto-rows:20px; border-top:1.2px solid #6B4C63; flex:1;">
    <div style="height:16px; box-sizing:border-box; font-size:9px; line-height:1; font-weight:600; color:#6B4C63; padding:3px 4px 4px; border-bottom:1px solid #6B4C63;">Evento</div>
    <div style="height:16px; box-sizing:border-box; font-size:9px; line-height:1; font-weight:600; color:#6B4C63; padding:3px 4px 4px; border-bottom:1px solid #6B4C63; border-left:0.7px solid #D9C6D2;">Lugar</div>
    <div style="height:16px; box-sizing:border-box; font-size:9px; line-height:1; font-weight:600; color:#6B4C63; padding:3px 4px 4px; border-bottom:1px solid #6B4C63; border-left:0.7px solid #D9C6D2;">Fecha</div>

    <div id="event-rows" style="display:contents;"></div>
  </div>

  <p style="margin:8px 0 0; font-size:9px; color:#B79BAE; text-align:center; flex-shrink:0;">Audiciones, examenes, conciertos y fechas clave</p>
</div>
</div>
<script>
(function(){
  const container = document.getElementById("event-rows");
  let html = "";
  const rowCount = 15;
  for(let i=0;i<rowCount;i++){
    html += `<div style="height:20px; box-sizing:border-box; border-bottom:0.7px dashed #D9C6D2;"></div>`;
    html += `<div style="height:20px; box-sizing:border-box; border-bottom:0.7px dashed #D9C6D2; border-left:0.7px solid #D9C6D2;"></div>`;
    html += `<div style="height:20px; box-sizing:border-box; border-bottom:0.7px dashed #D9C6D2; border-left:0.7px solid #D9C6D2;"></div>`;
  }
  container.innerHTML = html;
})();
</script>
